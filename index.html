<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>سباق المعرفة</title>
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&display=swap" rel="stylesheet">
<style>
    :root {
        --primary-bg: #f5e6d3;
        --secondary-bg: #fffaf0;
        --card-bg: #fff5e6;
        --accent-color: #ff9800;
        --accent-hover: #f57c00;
        --text-light: #3e2723;
        --text-dark: #8d6e63;
        --border-color: #e8d4c4;
        --shadow-warm: rgba(255, 152, 0, 0.15);
        --danger-color: #f43f5e;
    }

    * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
    }

    body {
        font-family: 'Cairo', sans-serif;
        background-color: var(--primary-bg);
        color: var(--text-light);
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        /* Subtle warm texture */
        background-image:
            radial-gradient(ellipse at 20% 20%, rgba(255,152,0,0.08) 0%, transparent 60%),
            radial-gradient(ellipse at 80% 80%, rgba(255,152,0,0.06) 0%, transparent 60%);
    }

    /* ---- HEADER ---- */
    header {
        text-align: center;
        padding: 40px 20px 20px;
        animation: fadeInDown 0.8s ease-out both;
    }

    header img {
        width: 160px;
        height: 160px;
        border-radius: 50%;
        border: 4px solid var(--border-color);
        box-shadow: 0 8px 32px var(--shadow-warm), 0 0 0 8px rgba(255,152,0,0.08);
        animation: popIn 0.9s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        object-fit: cover;
        background: var(--secondary-bg);
    }

    h1 {
        margin-top: 18px;
        font-size: 2.6rem;
        font-weight: 700;
        color: var(--text-light);
        letter-spacing: 1px;
        text-shadow: 0 2px 8px rgba(0,0,0,0.06);
        animation: fadeInDown 1s ease-out 0.2s both;
    }

    /* ---- PROGRESS BAR ---- */
    .progress-container {
        background: var(--border-color);
        border-radius: 20px;
        margin: 18px auto 0;
        width: 70%;
        max-width: 420px;
        height: 10px;
        overflow: hidden;
        animation: fadeIn 1s ease 0.4s both;
    }

    .progress-bar {
        background: linear-gradient(90deg, var(--accent-color), #ffcc00);
        height: 100%;
        width: 0%;
        border-radius: 20px;
        animation: loadProgress 3s ease-out 0.5s forwards;
        box-shadow: 0 0 8px rgba(255,152,0,0.4);
    }

    /* ---- MAIN CARD ---- */
    main {
        flex: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 30px 20px;
        animation: fadeIn 0.8s ease 0.3s both;
    }

    .card {
        max-width: 580px;
        width: 100%;
        background: var(--secondary-bg);
        padding: 40px 36px;
        border-radius: 20px;
        border: 2px solid var(--border-color);
        box-shadow:
            0 8px 32px rgba(0,0,0,0.08),
            0 2px 8px var(--shadow-warm);
        text-align: center;
    }

    .card h2 {
        font-size: 1.7rem;
        font-weight: 700;
        color: var(--accent-color);
        margin-bottom: 12px;
    }

    .card p {
        color: var(--text-dark);
        font-size: 1.1rem;
        line-height: 1.8;
        margin-bottom: 30px;
    }

    /* ---- DIVIDER ---- */
    .divider {
        width: 60px;
        height: 3px;
        background: linear-gradient(90deg, var(--accent-color), #ffcc00);
        border-radius: 4px;
        margin: 0 auto 28px;
    }

    /* ---- BUTTONS ---- */
    .btn-container {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 14px;
    }

    .btn {
        background: var(--card-bg);
        color: var(--text-light);
        padding: 16px 10px;
        border: 2px solid var(--border-color);
        border-radius: 14px;
        font-size: 1.05rem;
        font-weight: 700;
        cursor: pointer;
        transition: all 0.3s cubic-bezier(0.4,0,0.2,1);
        font-family: 'Cairo', sans-serif;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        text-decoration: none;
    }

    .btn .btn-icon {
        font-size: 1.6rem;
    }

    .btn:hover {
        background: var(--accent-color);
        color: #fff;
        border-color: var(--accent-color);
        transform: translateY(-4px);
        box-shadow: 0 8px 20px rgba(255,152,0,0.3);
    }

    /* Primary CTA button spans full width */
    .btn.primary {
        grid-column: 1 / -1;
        background: var(--accent-color);
        color: #fff;
        border-color: var(--accent-color);
        padding: 18px 10px;
        font-size: 1.2rem;
        box-shadow: 0 4px 16px rgba(255,152,0,0.3);
    }

    .btn.primary:hover {
        background: var(--accent-hover);
        border-color: var(--accent-hover);
        box-shadow: 0 8px 24px rgba(255,152,0,0.45);
    }

    /* ---- FOOTER ---- */
    footer {
        text-align: center;
        padding: 16px;
        background: var(--secondary-bg);
        border-top: 1px solid var(--border-color);
        font-size: 0.85rem;
        color: var(--text-dark);
        animation: fadeIn 1s ease 0.6s both;
    }

    /* ---- ANIMATIONS ---- */
    @keyframes fadeIn {
        from { opacity: 0; }
        to   { opacity: 1; }
    }

    @keyframes fadeInDown {
        from { opacity: 0; transform: translateY(-20px); }
        to   { opacity: 1; transform: translateY(0);     }
    }

    @keyframes popIn {
        0%   { transform: scale(0.6); opacity: 0; }
        70%  { transform: scale(1.05); }
        100% { transform: scale(1);   opacity: 1; }
    }

    @keyframes loadProgress {
        from { width: 0%; }
        to   { width: 75%; }
    }

    /* ---- RESPONSIVE ---- */
    @media (max-width: 480px) {
        h1 { font-size: 1.9rem; }
        .card { padding: 28px 20px; }
        .btn-container { grid-template-columns: 1fr; }
        .btn.primary { grid-column: 1; }
        header img { width: 120px; height: 120px; }
    }
</style>
</head>
<body>

    <header>
        <img src="uploads/logo.png" alt="شعار المسابقة">
        <h1>سباق المعرفة</h1>
        <div class="progress-container">
            <div class="progress-bar"></div>
        </div>
    </header>

    <main>
        <div class="card">
            <h2>مرحبًا بك في التحدي! 🏆</h2>
            <div class="divider"></div>
            <p>استعد لاختبار معرفتك في أجواء مليئة بالحماس والمتعة. كوّن فريقك وابدأ التحدي!</p>

            <div class="btn-container">
                <a class="btn primary" href="game.html">
                    <span class="btn-icon">🚀</span>
                    ابدأ الآن
                </a>
                <a class="btn" href="admin.html">
                    <span class="btn-icon">⚙️</span>
                    لوحة التحكم
                </a>
                <a class="btn" href="info.html">
                    <span class="btn-icon">📃</span>
                    تعليمات
                </a>
                <a class="btn" href="team_distributor.html">
                    <span class="btn-icon">👥</span>
                    موزع الفرق
                </a>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2025 سباق المعرفة — جميع الحقوق محفوظة
    </footer>

</body>
</html>
